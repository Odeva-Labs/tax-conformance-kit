name: Publish Ruby Client

on:
  push:
    tags:
      - "ruby-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Ruby gem version to publish, with or without the ruby-v prefix"
        required: true
        type: string

jobs:
  publish:
    runs-on: deploy
    permissions:
      contents: read
    env:
      GOCACHE: /tmp/tck-gocache
      GOMODCACHE: /tmp/tck-gomodcache
      REQUESTED_VERSION: ${{ inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v7.0.0

      - name: Checkout requested release tag
        id: release
        run: |
          version="${REQUESTED_VERSION#ruby-v}"
          tag="ruby-v${version}"
          git fetch --depth=1 origin "refs/tags/${tag}:refs/tags/${tag}"
          git checkout "$tag"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Ruby
        uses: https://github.com/ruby/setup-ruby@v1.316.0
        with:
          ruby-version: "4.0.6"

      - name: Verify tag matches gem version
        working-directory: clients/ruby
        env:
          EXPECTED_VERSION: ${{ steps.release.outputs.version }}
        run: |
          version="$(ruby -I lib -e 'require "tax_conformance_kit/version"; puts TaxConformanceKit::VERSION')"
          if [ "$EXPECTED_VERSION" != "$version" ]; then
            echo "expected version ${EXPECTED_VERSION} does not match gem version ${version}"
            exit 1
          fi

      - name: Setup Go
        uses: https://github.com/actions/setup-go@v6.5.0
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.mod

      - name: Ensure Go cache directories exist
        run: mkdir -p "$GOCACHE" "$GOMODCACHE"

      - name: Setup just
        uses: https://github.com/taiki-e/install-action@just

      - name: Build gem (compile taxctl + bundle data)
        run: just build-gem

      - name: Configure RubyGems credentials
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          mkdir -p ~/.gem
          cat > ~/.gem/credentials <<EOF
          ---
          :rubygems_api_key: ${RUBYGEMS_API_KEY}
          EOF
          chmod 0600 ~/.gem/credentials

      - name: Publish gem
        working-directory: clients/ruby
        run: |
          gemspec="tax_conformance_kit.gemspec"
          test -f "$gemspec" || { echo "Missing gemspec: $gemspec"; exit 1; }
          gem_file="$(ruby -e 'spec = Gem::Specification.load(ARGV.fetch(0)); abort("Invalid gemspec: #{ARGV.fetch(0)}") unless spec; puts spec.file_name' "$gemspec")"
          gem push "$gem_file"
