name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  go:
    runs-on: checks
    env:
      GOCACHE: /tmp/tck-gocache
      GOMODCACHE: /tmp/tck-gomodcache

    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v7.0.0

      - name: Setup Go
        uses: https://github.com/actions/setup-go@v6.5.0
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.mod

      - name: Ensure Go cache directories exist
        run: mkdir -p "$GOCACHE" "$GOMODCACHE"

      - name: Install just
        uses: https://github.com/taiki-e/install-action@just

      - name: Go vet
        run: just vet

      - name: Go tests
        run: just test

  ruby-client:
    runs-on: checks
    env:
      GOCACHE: /tmp/tck-gocache
      GOMODCACHE: /tmp/tck-gomodcache

    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v7.0.0

      - name: Setup Go
        uses: https://github.com/actions/setup-go@v6.5.0
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.mod

      - name: Ensure Go cache directories exist
        run: mkdir -p "$GOCACHE" "$GOMODCACHE"

      - name: Setup Ruby
        uses: https://github.com/ruby/setup-ruby@v1.316.0
        with:
          ruby-version: "4.0.5"

      - name: Install just
        uses: https://github.com/taiki-e/install-action@just

      - name: Ruby client tests
        run: just test-ruby-client

      - name: Ruby gem packaging smoke test
        run: just test-ruby-gem
