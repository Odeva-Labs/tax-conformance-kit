name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    env:
      GOCACHE: /tmp/tck-gocache
      GOMODCACHE: /tmp/tck-gomodcache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.mod

      - name: Ensure Go cache directories exist
        run: mkdir -p "$GOCACHE" "$GOMODCACHE"

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Go vet
        run: just vet

      - name: Go tests
        run: just test

  ruby-client:
    runs-on: ubuntu-latest
    env:
      GOCACHE: /tmp/tck-gocache
      GOMODCACHE: /tmp/tck-gomodcache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.mod

      - name: Ensure Go cache directories exist
        run: mkdir -p "$GOCACHE" "$GOMODCACHE"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Ruby client tests
        run: just test-ruby-client

      - name: Ruby gem packaging smoke test
        run: just test-ruby-gem
